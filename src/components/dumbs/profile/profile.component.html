<div class="profile-container">
  <div class="card">
    <div class="ds-top"></div>
    <div class="avatar-holder">
      <img [src]="user.avatar || '/Sharegame.gif'" [alt]="user.username || 'Avatar'">
    </div>
    <div class="name">
      <h2>{{ user.username || 'Utilisateur' }}</h2>
      <h6 title="Rôle">{{ user.role || 'User' }}</h6>
    </div>
    <div class="button">
      <button class="btn action-button" (click)="editProfile()">Modifier le profil</button>
    </div>
    <div class="ds-info">
      <div class="ds email">
        <h6 title="Email">Email</h6>
        <p>{{ user.email || 'N/A' }}</p>
      </div>
      <div class="ds role">
        <h6 title="Rôle">Rôle</h6>
        <p>{{ user.role || 'User' }}</p>
      </div>
      <div class="ds birthday">
        <h6 title="Date de naissance">Birthday</h6>
        <p>{{ user.birthday || 'N/A' }}</p>
      </div>
    </div>
    <div class="ds-skill">
      <h6>Bio</h6>
      <div class="bio-content">
        <p>{{ user.bio || 'Aucune biographie ajoutée' }}</p>
      </div>
    </div>
    <div class="action-buttons">
      <button *ngIf="isAdmin" class="action-button admin-button" (click)="goToAdmin()">Panneau d'administration</button>
      <button *ngIf="isDeveloper" class="action-button developer-button" (click)="goToDeveloper()">Panneau développeur</button>
      <button class="action-button logout" (click)="logout()">Se déconnecter</button>
    </div>
  </div>
</div>
