<form (submit)="onSubmit()" class="card-user">
  <div class="sign-up-layout">
    <div class="sign-up-column sign-up-column--form">
      <h2>Inscription</h2>

      <label class="input-label" for="username">Nom d'utilisateur
        <input class="input-field" id="username" type="text" [(ngModel)]="username" name="username" required>
      </label>

      <label class="input-label" for="email">Email
        <input class="input-field" id="email" type="email" [(ngModel)]="email" name="email" required>
      </label>

      <label class="input-label" for="password">Mot de passe
        <input
          class="input-field"
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          (ngModelChange)="errorMessage = ''"
          [attr.minlength]="minPasswordLength"
          autocomplete="new-password"
        >
      </label>
      <p class="password-hint" *ngIf="password.length < minPasswordLength">
        Minimum {{ minPasswordLength }} caractères — {{ password.length }}/{{ minPasswordLength }} saisis.
      </p>

      <label class="input-label" for="confirmPassword">Confirmer le mot de passe
        <input
          class="input-field"
          id="confirmPassword"
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          (ngModelChange)="errorMessage = ''"
          [attr.minlength]="minPasswordLength"
          autocomplete="new-password"
        >
      </label>

      <label class="input-label" for="birthday">Date de naissance
        <input class="input-field input-field--date" id="birthday" type="date" [(ngModel)]="birthday" name="birthday">
      </label>

      <button class="action-button" type="submit">S'inscrire</button>

      <ng-content select="[auth-toggle]"></ng-content>

      <div *ngIf="errorMessage" class="error-message" role="alert">
        {{ errorMessage }}
      </div>
    </div>

    <div class="sign-up-column sign-up-column--brand">
      <img src="/Sharegame.gif" alt="PlayForge" loading="lazy">
    </div>
  </div>
</form>
